services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finmate
      POSTGRES_PASSWORD: finmate
      POSTGRES_DB: finmate
    ports:
      - "5432:5432"
    volumes:
      - finmate_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finmate"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/finmate_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - finmate_neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - finmate_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  finmate_pg_data:
  finmate_neo4j_data:
  finmate_qdrant_data:
