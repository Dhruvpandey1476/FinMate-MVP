# Render blueprint — one-click deploy of the FinMate backend.
# 1. Push this repo to GitHub.
# 2. Render → New → Blueprint → point at this repo.
# 3. Set GROQ_API_KEY in the dashboard (JWT_SECRET is auto-generated).
services:
  - type: web
    name: finmate-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: finmate-db
          property: connectionString
      - key: EXTRA_ORIGINS
        sync: false

databases:
  - name: finmate-db
    plan: free
